# TEMPLATE — copy to aleonard.us-api/.github/workflows/deploy_qa.yaml
name: Deploy to QA

# QA deploys are main-driven (see druthers-infra/docs/PROMOTION.md): every
# push to main builds the image into the QA project's Artifact Registry,
# runs alembic migrations against the Neon qa branch, and rolls the
# druthers-api service in the QA project. Prod is untouched — it deploys
# only on releases via deploy_cloud_run.yaml.
# No-ops until the GCP_*_QA repo variables exist (docs/QA-ENVIRONMENT.md).

on:
  push:
    branches: [main]

concurrency:
  group: deploy-qa
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: vars.GCP_WIF_PROVIDER_QA != ''
    permissions:
      contents: read
      id-token: write
    env:
      IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID_QA }}/druthers/aleonard.us-api:main-${{ github.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER_QA }}
          service_account: ${{ vars.GCP_DEPLOY_SA_QA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Build and push image
        run: |
          gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Run database migrations
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL_QA }}
          ENV: qa
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "NEON_DATABASE_URL_QA secret not set — skipping migrations."
            exit 0
          fi
          pip install -r requirements/base.txt
          alembic upgrade head

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy druthers-api \
            --image "$IMAGE" \
            --region ${{ vars.GCP_REGION }} \
            --project ${{ vars.GCP_PROJECT_ID_QA }}
