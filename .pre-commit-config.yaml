fail_fast: true
default_stages: [pre-commit]   # existing hooks run per-commit; tests run pre-push (below)

repos:
- repo: https://github.com/gitleaks/gitleaks
  rev: v8.30.1
  hooks:
  - id: gitleaks
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v5.0.0
  hooks:
  - id: check-json
  - id: check-yaml
  - id: end-of-file-fixer
  - id: trailing-whitespace
  - id: debug-statements
  - id: check-added-large-files
    args: [--maxkb=200]
  - id: double-quote-string-fixer
  - id: mixed-line-ending
  - id: name-tests-test
  - id: no-commit-to-branch
- repo: https://github.com/python-openapi/openapi-spec-validator
  rev: 0.7.1
  hooks:
  - id: openapi-spec-validator
    files: "openapi\\.json"
-   repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
    - id: black
      args: [--skip-string-normalization]
      language_version: python3.14
- repo: local
  hooks:
  - id: pylint
    name: pylint
    entry: ./.venv/bin/pylint
    language: system
    types: [python]
    args: [--ignore=.venv, --disable=too-few-public-methods]
  # Tests run at PRE-PUSH (not per-commit) and only for what changed
  # (testmon maps coverage -> affected tests). CI runs the full suite.
  - id: pytest-changed
    name: pytest (changed only, pre-push)
    entry: ./.venv/bin/pytest --testmon -q
    language: system
    stages: [pre-push]
    pass_filenames: false
    always_run: true
