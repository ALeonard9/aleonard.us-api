version: '3'

tasks:
  default:
    desc: "List all available tasks"
    cmds:
      - task -l
  db:
    desc: "Build Phoenix Docker environment"
    vars:
      ENV: '{{default "dev" .CLI_ARGS}}'
    cmds:
      - docker compose -f dc-{{.ENV}}.yml --env-file env/{{.ENV}}.env build --no-cache
  du:
    desc: "Launch Phoenix Docker environment (default: dev)"
    vars:
      ENV: '{{default "dev" .CLI_ARGS}}'
    cmds:
      - docker compose -f dc-{{.ENV}}.yml --env-file env/{{.ENV}}.env up -d

  dd:
    desc: "Stop Phoenix Docker environment"
    vars:
      ENV: '{{default "dev" .CLI_ARGS}}'
    cmds:
      - docker compose -f dc-{{.ENV}}.yml --env-file env/{{.ENV}}.env down

  dr:
    desc: "Rebuild Phoenix Docker environment"
    vars:
      ENV: '{{default "dev" .CLI_ARGS}}'
    deps: [dd]
    cmds:
      - task: db
        vars: { ENV: '{{.ENV}}' }
      - task: du
        vars: { ENV: '{{.ENV}}' }

  migrate:
    desc: "Apply Alembic migrations (alembic upgrade head)"
    cmds:
      - alembic upgrade head

  revision:
    desc: "Autogenerate a new Alembic migration. Usage: task revision -- \"message\""
    vars:
      MSG: '{{default "migration" .CLI_ARGS}}'
    cmds:
      - alembic revision --autogenerate -m "{{.MSG}}"

  enrich:movies:
    desc: "Backfill OMDB detail for existing movies (throttled, resumable)"
    cmds:
      - python -m app.migration.enrich_movies

  enrich:tv:
    desc: "Backfill TVMaze detail + episodes for existing TV shows (throttled, resumable)"
    cmds:
      - python -m app.migration.enrich_tv

  enrich:books:
    desc: "Backfill Google Books detail for existing books (throttled, resumable)"
    cmds:
      - python -m app.migration.enrich_books

  enrich:countries:
    desc: "Seed the full world list + enrich countries from REST Countries"
    cmds:
      - python -m app.migration.enrich_countries

  import:orion:
    desc: "Import legacy orion (MySQL) data into phoenix. Usage: task import:orion -- --dry-run"
    cmds:
      - python -m app.migration.orion_import {{.CLI_ARGS}}

  gh:
    desc: "Open project repository in GitHub"
    cmds:
      - open https://github.com/aleonard9/aleonard.us-api
    silent: true

  test:
    desc: "Run pytest"
    cmds:
      - pytest --cov=./ --cov-report=html:.reports/coverage --cov-report=term --html=.reports/junit/test-results.html

  sca:
    desc: "Run security checks on dependencies"
    cmds:
      - >
          snyk test
          --file=requirements/base.txt
          --package-manager=pip
          --severity-threshold=high
          --fail-on=patchable

  sast:
    desc: "Run static analysis on code"
    cmds:
      - >
          snyk code test
          --all-projects
          --exclude=tests
          --severity-threshold=high

  container:
    desc: "Run container security checks"
    cmds:
      - |
        if [ "$(uname)" = "Darwin" ]; then
          EXTRA_ARG="--platform=linux/amd64"
        else
          EXTRA_ARG=""
        fi
        # Build the image with the appropriate platform argument
        docker build $EXTRA_ARG -t ghcr.io/aleonard9/aleonard.us-api:test .
        # Run Snyk container test (no need to pass EXTRA_ARG here)
        snyk container test ghcr.io/aleonard9/aleonard.us-api:test \
          --file=Dockerfile \
          --severity-threshold=high
        docker rmi ghcr.io/aleonard9/aleonard.us-api:test
  lz:
    desc: "Echos current landing zone"
    platforms: [darwin]
    cmds:
      - cmd: echo 'Current landing zone m3'
        platforms: ['darwin']
      - cmd: echo 'Current landing zone gs'
        platforms: ['linux']
